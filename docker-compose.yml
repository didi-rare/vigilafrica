services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: vigilafrica-db
    environment:
      - POSTGRES_USER=vigilafrica
      - POSTGRES_PASSWORD=vigilafrica
      - POSTGRES_DB=vigilafrica
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vigilafrica"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
