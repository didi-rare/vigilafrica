services:
  postgres:
    image: postgis/postgis:15-3.4@sha256:3f4a5d48e0be9580ed70ed618cd039ce57bbb2dd113053d3836e28513f1f87cd
    container_name: vigilafrica-db
    environment:
      - POSTGRES_USER=vigilafrica
      - POSTGRES_PASSWORD=vigilafrica
      - POSTGRES_DB=vigilafrica
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vigilafrica"]
      interval: 5s
      timeout: 5s
      retries: 5
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: vigilafrica-api
    depends_on:
      postgres:
        condition: service_healthy
      geoipupdate:
        condition: service_started
    env_file: .env
    environment:
      - DATABASE_URL=postgres://vigilafrica:vigilafrica@postgres:5432/vigilafrica?sslmode=disable
      - GEOIP_DB_PATH=/usr/share/GeoIP/GeoLite2-City.mmdb
    ports:
      - "8080:8080"
    volumes:
      - maxmind_data:/usr/share/GeoIP:ro
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
  geoipupdate:
    image: maxmindinc/geoipupdate:v7.1@sha256:faecdca22579730ab0b7dea5aa9af350bb3c93cb9d39845c173639ead30346d2
    container_name: vigilafrica-geoip
    environment:
      - GEOIPUPDATE_ACCOUNT_ID=${MAXMIND_ACCOUNT_ID:-0}
      - GEOIPUPDATE_LICENSE_KEY=${MAXMIND_LICENSE_KEY:-000000000000}
      - GEOIPUPDATE_EDITION_IDS=GeoLite2-City
      - GEOIPUPDATE_FREQUENCY=168 # update once a week
    volumes:
      - maxmind_data:/usr/share/GeoIP
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
  maxmind_data:
