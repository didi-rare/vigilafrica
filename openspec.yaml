# OpenSpec Configuration: VigilAfrica
# Version: 1.0 — Locked 2026-04-12

project:
  id: vigilafrica
  name: VigilAfrica
  description: African Natural Event Tracker — open-source localized natural event awareness

specifications:
  root: openspec/specs/vigilafrica
  # Active locked spec files. SUPERSEDED files are excluded from validation.
  patterns:
    - "product.md"
    - "architecture.md"
    - "roadmap.md"
    - "api-contract.md"
    - "data-model.md"
    - "decisions.md"
  # openapi.yaml is tracked by version control but excluded from OpenSpec validation.
  # It is a machine-readable artifact generated from api-contract.md and is not a
  # governance document — it does not need Purpose/Requirements sections.


drift:
  threshold: 0
  check_on_validate: true

validation:
  strict: true

workflow:
  profile: expanded
  branches:
    development: dev
    main: staging
    releases: prod
