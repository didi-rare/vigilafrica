<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>VigilAfrica — Natural Event Awareness for Africa</title>
    <meta name="description" content="VigilAfrica translates raw NASA satellite event data into local African context — floods and wildfires by country and state. Open-source. Nigeria and Ghana live." />
    <!-- robots value is rewritten at build time by vite.config.ts robotsMetaPlugin based on VITE_ENV -->
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://vigilafrica.org/" />

    <!-- Open Graph -->
    <meta property="og:title" content="VigilAfrica — Natural Event Awareness for Africa" />
    <meta property="og:description" content="What is happening near you? Localized flood and wildfire data for African communities." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vigilafrica.org/" />
    <meta property="og:image" content="https://vigilafrica.org/social-card.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="VigilAfrica — Natural Event Awareness for Africa" />
    <meta name="twitter:description" content="What is happening near you? Localized flood and wildfire data for African communities." />
    <meta name="twitter:image" content="https://vigilafrica.org/social-card.png" />

    <!-- Release feed (GitHub releases atom) -->
    <link rel="alternate" type="application/rss+xml" title="VigilAfrica Releases" href="https://github.com/didi-rare/vigilafrica/releases.atom" />

    <!-- Identity: Epicenter Contours mark (ADR-016) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" sizes="16x16 32x32 48x48" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Typography is self-hosted via @fontsource (ADR-015) — no font CDN. -->

    <!--
      Self-hosted Umami analytics tracker (chore-analytics-and-feedback).
      Both values are PUBLIC identifiers, substituted at build time from the
      environment via Vite's %VITE_*% replacement (§15.4 — URLs never hardcoded
      in source). When VITE_ANALYTICS_URL is empty (local dev with no local
      Umami) the src resolves to "/script.js", 404s, and the tracker silently
      fails to load — analytics.ts tolerates window.umami being absent.
      Privacy posture: no cookies, no PII; data-do-not-track honours browser DNT.
    -->
    <script
      defer
      src="%VITE_ANALYTICS_URL%/script.js"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"
      data-do-not-track="true"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
