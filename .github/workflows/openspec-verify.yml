name: OpenSpec — Drift Verification

on:
  push:
    branches: [ development ]        # Catch drift on every direct push to development
  pull_request:
    branches: [ development, main, releases ]  # Catch drift on every PR at all levels

jobs:
  openspec-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: '1.26.5'

      - name: Fetch Development Branch
        # --update-head-ok allows the fetch to update `development` even when
        # the workflow is checked out on it (direct pushes to development, or
        # PRs from development → main). Without it, fetch fails with "refusing
        # to fetch into branch refs/heads/development checked out at ...".
        run: git fetch origin development:development --update-head-ok

      - name: Cache Npm Store
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.npm
          # Keyed on project lockfile hash as a dependency-era proxy.
          # Global installs (@latest) do not have a lockfile, so this key
          # acts as a rough cache invalidator when the wider dep tree changes.
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install Root Dependencies
        run: npm ci

      - name: OpenSpec Validate
        run: npx openspec validate --specs

      # Sentinel governance gate (ADR-010). The auditor (api/cmd/sentinel) fails
      # the build when a change to a critical path (api/internal/, api/cmd/,
      # web/src/) lacks an OpenSpec record (openspec/proposals/ or
      # openspec/changes/) and is not tagged [trivial]. Static analysis runs
      # first as a cheap compile/vet check over the api module.
      - name: Sentinel Audit — Static Analysis
        working-directory: api
        run: go vet ./...

      - name: Sentinel Audit — Governance Gate
        working-directory: api
        # The auditor diffs HEAD against origin/development. The earlier
        # "Fetch Development Branch" step updates the local `development` ref;
        # this refspec ensures the remote-tracking ref the auditor actually
        # compares against (origin/development) is present in the CI checkout.
        run: |
          git fetch origin development:refs/remotes/origin/development
          go run ./cmd/sentinel

