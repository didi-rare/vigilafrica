name: OpenSpec — Drift Verification

on:
  push:
    branches: [ development ]        # Catch drift on every direct push to development
  pull_request:
    branches: [ development, main, releases ]  # Catch drift on every PR at all levels

jobs:
  openspec-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install OpenSpec CLI
        run: npm install -g @fission-ai/openspec@latest

      - name: OpenSpec Validate
        run: openspec validate --specs

