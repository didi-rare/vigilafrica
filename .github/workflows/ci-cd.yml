name: VigilAfrica CI/CD

on:
  push:
    branches: [ development, main, releases ]
  pull_request:
    branches: [ main, releases ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'          # Must match api/go.mod — see ADR-008

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 22 LTS required: web/package.json pins @types/node@^24, vite@^8,
          # and @vitejs/plugin-react@^6 — all require Node >=22. Node 22 is current
          # LTS (since Oct 2024) and is the production-safe choice.
          node-version: '22'

      - name: Cache Npm Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          # Key on package-lock.json across the whole tree for deterministic hits.
          # Falls back to any prior npm cache for this OS on a miss.
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install Root & Web Dependencies
        # npm ci installs exactly what is in package-lock.json — no range
        # re-resolution, no silent version drift. Fails loudly on lockfile mismatch.
        run: |
          npm ci
          cd web && npm ci

      - name: Run Go Tests
        run: |
          cd api
          go test ./...

      - name: Run Database Integration Tests
        run: |
          cd api
          go test -v -cover -tags=integration ./internal/database/

      - name: Run Frontend Tests
        run: |
          cd web
          npm run test

      - name: Generate milestone data
        run: node scripts/generate-milestones.js

      - name: Build Web
        run: |
          cd web
          npm run build

      - name: Build API
        run: |
          cd api
          go build -o ../vigilafrica ./cmd/server/    # Entry point: api/cmd/server/main.go (ADR-007)

  deploy-staging:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel (Staging)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-args: '--staging'

  deploy-production:
    needs: build-and-test
    if: github.ref == 'refs/heads/releases'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-args: '--prod'

