name: VigilAfrica CI/CD

on:
  push:
    branches: [ development, main, release ]
  pull_request:
    branches: [ development, main, release ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'          # Must match api/go.mod — see ADR-008

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 22 LTS required: web/package.json pins @types/node@^24, vite@^8,
          # and @vitejs/plugin-react@^6 — all require Node >=22. Node 22 is current
          # LTS (since Oct 2024) and is the production-safe choice.
          node-version: '22'

      - name: Cache Npm Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          # Key on package-lock.json across the whole tree for deterministic hits.
          # Falls back to any prior npm cache for this OS on a miss.
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install Root & Web Dependencies
        # npm ci installs exactly what is in package-lock.json — no range
        # re-resolution, no silent version drift. Fails loudly on lockfile mismatch.
        run: |
          npm ci
          cd web && npm ci

      - name: Check OpenAPI spec in sync
        run: |
          node scripts/sync-openapi.js
          git diff --exit-code api/internal/handlers/openapi.yaml || \
            (echo "❌ api/internal/handlers/openapi.yaml is out of sync with openspec/specs/vigilafrica/openapi.yaml — run 'npm run sync:openapi' and commit the result." && exit 1)

      - name: Run Go Tests
        run: |
          cd api
          go test ./...

      - name: Run Database Integration Tests
        run: |
          cd api
          go test -v -cover -tags=integration ./internal/database/

      - name: Run Frontend Tests
        run: |
          cd web
          npm run test

      - name: Generate milestone data
        run: node scripts/generate-milestones.js

      - name: Build Web
        run: |
          cd web
          npm run build

      - name: Build API
        run: |
          cd api
          go build -o ../vigilafrica ./cmd/server/    # Entry point: api/cmd/server/main.go (ADR-007)

