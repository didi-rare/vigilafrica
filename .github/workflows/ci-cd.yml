name: VigilAfrica CI/CD

on:
  push:
    branches: [ development, main, releases ]
  pull_request:
    branches: [ main, releases ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'          # Must match api/go.mod — see ADR-008

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Root & Web Dependencies
        run: |
          npm install
          cd web && npm install

      - name: Run Go Tests
        run: |
          cd api
          go test ./...

      - name: Generate milestone data
        run: node scripts/generate-milestones.js

      - name: Build Web
        run: |
          cd web
          npm run build

      - name: Build API
        run: |
          cd api
          go build -o ../vigilafrica ./cmd/server/    # Entry point: api/cmd/server/main.go (ADR-007)

  deploy-staging:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel (Staging)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-args: '--staging'

  deploy-production:
    needs: build-and-test
    if: github.ref == 'refs/heads/releases'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-args: '--prod'

