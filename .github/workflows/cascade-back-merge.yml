name: Cascade Back-Merge

# After release-please's Release PR merges into `release`, propagate the new
# CHANGELOG.md (and any hotfix code) back to `main`, then to `development`.
#
# Two-stage by design (spec §B4): the second leg (main → development) only runs
# AFTER the first leg (release → main) has actually merged. This guarantees the
# changelog/hotfix has actually landed on main before development pulls from it,
# which is correct under any concurrent-deploy scenario.
#
# Both legs are gated by base/head branch matching so the workflow is inert
# until release-please opens its first Release PR.

on:
  pull_request:
    types: [closed]
    branches: [main, release]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: cascade-back-merge
  cancel-in-progress: false

jobs:
  release_to_main:
    # Fires when release-please's Release PR (head branch starts with `release-please--`)
    # has been merged into `release`.
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'release' &&
      startsWith(github.event.pull_request.head.ref, 'release-please--')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Open back-merge PR release -> main
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          TRIGGERING_PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          existing=$(gh pr list --base main --head release --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "Cascade PR release -> main already open: #$existing — skipping"
            exit 0
          fi
          gh pr create \
            --base main \
            --head release \
            --title "chore: backmerge release into main" \
            --body "Automated cascade back-merge from \`release\` to \`main\`. Carries the latest CHANGELOG.md update (and any hotfix code that landed on \`release\`) back to \`main\` so staging stays in sync. Triggered by the merge of #${TRIGGERING_PR}. On merge, this PR triggers the second leg (\`main\` → \`development\`) automatically."

  main_to_development:
    # Fires when the first-leg cascade PR (head: release, base: main) merges into main.
    # No one should be opening release -> main PRs outside this cascade, so the head/base
    # match is sufficient gating — but if it ever happens manually, propagating to dev is
    # still the right behaviour, so this stays unguarded.
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.ref == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Open back-merge PR main -> development
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          TRIGGERING_PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          existing=$(gh pr list --base development --head main --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "Cascade PR main -> development already open: #$existing — skipping"
            exit 0
          fi
          gh pr create \
            --base development \
            --head main \
            --title "chore: backmerge main into development" \
            --body "Automated cascade back-merge from \`main\` to \`development\`. Final leg of the release back-merge — keeps \`development\` in sync with the latest released CHANGELOG.md and any hotfix code. Triggered by the merge of #${TRIGGERING_PR}."
