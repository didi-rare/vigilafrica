name: Cascade Back-Merge

# After release-please's Release PR merges into `release`, propagate the new
# CHANGELOG.md (and any hotfix code) back to `main`, then to `development`.
#
# Two-stage by design (spec §B4): the second leg (main → development) only runs
# AFTER the first leg (release → main) has actually merged. This guarantees the
# changelog/hotfix has actually landed on main before development pulls from it,
# which is correct under any concurrent-deploy scenario.
#
# Both legs are gated by base/head branch matching so the workflow is inert
# until release-please opens its first Release PR.

on:
  pull_request:
    types: [closed]
    branches: [main, release]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: cascade-back-merge
  cancel-in-progress: false

jobs:
  release_to_main:
    # Fires when release-please's Release PR (head branch starts with `release-please--`)
    # has been merged into `release`.
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'release' &&
      startsWith(github.event.pull_request.head.ref, 'release-please--')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Create cascade branch from release
        env:
          RELEASE_TAG: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          git config user.name "vigilafrica-bot"
          git config user.email "noreply@vigilafrica.org"
          git fetch origin release:release
          git checkout -B cascade/release-to-main release
          git push --force-with-lease origin cascade/release-to-main

      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          base: main
          branch: cascade/release-to-main
          title: "chore: backmerge release into main"
          body: |
            Automated cascade back-merge from `release` to `main`.

            Carries the latest CHANGELOG.md update (and any hotfix code that landed on `release`)
            back to `main` so staging stays in sync. Triggered by the merge of
            #${{ github.event.pull_request.number }}.

            On merge, this PR triggers the second leg (`main` → `development`) automatically.
          labels: |
            cascade
            automated

  main_to_development:
    # Fires when the first-leg cascade PR (head: cascade/release-to-main) merges into `main`.
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.ref == 'cascade/release-to-main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
          ref: development
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Create cascade branch from main
        run: |
          set -euo pipefail
          git config user.name "vigilafrica-bot"
          git config user.email "noreply@vigilafrica.org"
          git fetch origin main:main
          git checkout -B cascade/main-to-development main
          git push --force-with-lease origin cascade/main-to-development

      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          base: development
          branch: cascade/main-to-development
          title: "chore: backmerge main into development"
          body: |
            Automated cascade back-merge from `main` to `development`.

            Final leg of the release back-merge — keeps `development` in sync with the
            latest released CHANGELOG.md and any hotfix code. Triggered by the merge of
            #${{ github.event.pull_request.number }}.
          labels: |
            cascade
            automated
