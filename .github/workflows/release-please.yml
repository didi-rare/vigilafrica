name: Release Please

# DRY-RUN until Phase 2 of chore-automate-release-tagging.
# To enable: create `RELEASE_PLEASE_TOKEN` repo secret (fine-grained PAT, contents:write + pull-requests:write),
# then flip `if: false` to `if: true` on the `release-please` job below.
# See openspec/specs/chore-automate-release-tagging.md.

on:
  push:
    branches: [release]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # The default GITHUB_TOKEN cannot create tags that trigger downstream workflows.
      # `deploy-production.yml` listens for `v*.*.*` tag pushes — without a PAT here, the
      # tag would land but the deploy would silently never fire. See spec contract B6.
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
